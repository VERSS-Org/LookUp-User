<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Aplicacion de postulantes de LookUp.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="LookUp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>LookUp</title>
  <link rel="manifest" href="manifest.json">
  <style>
    html, body {
      background: #eff2f9;
      margin: 0;
      min-height: 100%;
    }

    #lookup-loading {
      align-items: center;
      color: #172033;
      display: flex;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      inset: 0;
      justify-content: center;
      position: fixed;
    }

    #lookup-loading .panel {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #lookup-loading img {
      height: 72px;
      object-fit: contain;
    }

    #lookup-loading span {
      color: #6b7591;
      font-size: 14px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="lookup-loading" aria-hidden="true">
    <div class="panel">
      <img src="icons/Icon-192.png" alt="">
      <span>Cargando LookUp...</span>
    </div>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('lookup-loading')?.remove();
    });
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
